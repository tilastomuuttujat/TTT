<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTT — Analytiikka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;1,400&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1a1a;--ink-2:#404040;--ink-3:#666;--ink-4:#999;--bg:#faf9f7;--surface:#fff;--rule:hsl(30 8% 88%);--a:hsl(38 45% 48%);--a-tint:hsl(38 40% 50%/.07);--drift:#c44c22;--change:#0c6b52;--purple:#473fa8;--gold:#b07d3a;--r:8px;--r2:14px;--sans:'DM Sans',system-ui,sans-serif;--serif:'Libre Baskerville',Georgia,serif;--mono:'JetBrains Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.6}
.wrap{max-width:960px;margin:0 auto;padding:0 1.5rem}
.hdr{border-bottom:1px solid var(--rule);padding:1.25rem 0;display:flex;align-items:center;gap:1rem}
.hdr-logo{font-family:var(--serif);font-style:italic;font-size:1.1rem;color:var(--ink-3)}
.hdr-logo em{color:var(--a);font-style:normal}
.hdr-title{flex:1;font-size:0.72rem;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-4)}
.hdr-meta{font-size:0.65rem;color:var(--ink-4);font-family:var(--mono)}
main{padding:2rem 0 4rem}
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--rule);border:1px solid var(--rule);border-radius:var(--r);overflow:hidden;margin-bottom:2rem}
.kpi-cell{background:var(--surface);padding:1.1rem 1rem;text-align:center}
.kpi-val{font-family:var(--serif);font-size:1.8rem;font-weight:400;font-style:italic;color:var(--a);line-height:1;display:block}
.kpi-lbl{font-size:0.55rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-4);margin-top:0.3rem;display:block}
.section{margin-bottom:2.5rem}
.section-title{font-size:0.6rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink-4);margin-bottom:0.75rem;display:flex;align-items:center;gap:0.75rem}
.section-title::after{content:'';flex:1;height:1px;background:var(--rule)}
.section-note{font-size:0.65rem;color:var(--ink-4);margin-bottom:0.9rem;line-height:1.6}
.card{background:var(--surface);border:1px solid var(--rule);border-radius:var(--r);overflow:hidden}
.row{display:grid;align-items:center;gap:0.5rem;padding:0.5rem 0.9rem;border-bottom:1px solid var(--rule)}
.row:last-child{border-bottom:none}
.row.hdr{background:var(--bg);font-size:0.55rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-4)}
.row:hover:not(.hdr){background:var(--a-tint)}
.ch-id{font-family:var(--mono);font-size:0.65rem;font-weight:700}
.ch-id.L{color:var(--drift)}.ch-id.P{color:var(--purple)}.ch-id.R{color:var(--change)}
.ch-name{font-size:0.73rem;color:var(--ink-2)}
.num{font-size:0.72rem;font-family:var(--mono);text-align:right;color:var(--ink-3)}
.num.hi{color:var(--ink);font-weight:600}
.bar-wrap{height:4px;background:var(--rule);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .5s ease}
.bar-fill.gold{background:var(--gold)}
.bar-fill.green{background:var(--change)}
.bar-fill.purple{background:var(--purple)}
.score-wrap{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.score-val{font-size:0.68rem;font-family:var(--mono);font-weight:700;color:var(--gold);min-width:28px;text-align:right}
.signal-pills{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.9rem}
.pill{font-size:0.6rem;padding:0.18rem 0.55rem;border-radius:99px;border:1px solid var(--rule);color:var(--ink-4)}
.pill strong{color:var(--ink-2)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.empty{padding:2.5rem 1rem;text-align:center;font-size:0.82rem;color:var(--ink-4)}
.empty code{font-family:var(--mono);font-size:0.72rem;background:var(--rule);padding:.15rem .4rem;border-radius:4px}
.loading{display:flex;align-items:center;justify-content:center;min-height:40vh;flex-direction:column;gap:1rem}
.spin{width:20px;height:20px;border:1.5px solid var(--rule);border-top-color:var(--a);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:700px){.kpi-strip{grid-template-columns:repeat(3,1fr)}.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-logo">J<em>·</em>I<em>·</em>M</div>
    <div class="hdr-title">Lukijakiinnostus — analytiikka</div>
    <div class="hdr-meta" id="hdr-meta">Ladataan…</div>
  </div>
  <main id="main"><div class="loading"><div class="spin"></div></div></main>
</div>
<script>
const CN={L01:'Historiallinen ajautuma',L02:'Rahoituksen logiikka',L03:'EU-kehysvalta',L04:'Mittaamisen politiikka',L05:'Passiivisuuden kustannus',L06:'Hallinnon hajautuminen',L07:'Demografinen paine',L08:'Eriarvoisuuden kone',L09:'Monikriisi',L10:'Kertaluonteinen pääoma',L11:'Hoivan rakennevika',L12:'Muutos on mahdollinen',P01:'Loukkuun jäänyt',P02:'Raha arjessa',P03:'Mallioppilaan hinta',P04:'Väärät mittarit',P05:'Toimimattomuuden uhri',P06:'Ketään ei löydy',P07:'Sukupolven taakka',P08:'Kaksi Suomea',P09:'Kolme shokkia',P10:'Järkevä päätös',P11:'Näkymätön kantaja',P12:'Mitä järjestelmä maksaa',R01:'Polkuja voi vaihtaa',R02:'Investointi on halvempaa',R03:'EU-liikkumavara',R04:'Mittaa se mikä merkitsee',R05:'Ennaltaehkäisy kannattaa',R06:'Vastuun koordinointi',R07:'Sukupolvisopimus',R08:'Eriarvoisuuden purkaminen',R09:'Kriisinkestävä järjestelmä',R10:'Luonnonvararahasto',R11:'Hoivainvestointi',R12:'Muutos on mahdollinen'};
const PN={kannustimet:'Kannustinrakenteiden tarkkailija',polkuriippuvuus:'Polkuriippuvuuden analyytikko',kompensaatio:'Kompensaatiotalouden kriitikko',demografia:'Demografisen muutoksen tarkkailija',jarjestelma:'Järjestelmälogiikan lukija'};
const CD={L01:1.3,L02:0.8,L03:0.5,L04:0.6,L05:1.8,L06:0.9,L07:0.7,L08:1.2,L09:0.4,L10:0.3,L11:0.6,L12:0.2,R01:0.5,R02:0.7,R03:0.4,R04:0.3,R05:0.5,R06:0.6,R07:0.4,R08:0.5,R09:0.3,R10:0.3,R11:0.4,R12:0.8};
const ct=id=>id.charAt(0);
const fmtTime=s=>!s?'—':Math.floor(s/60)>0?Math.floor(s/60)+'min '+(s%60)+'s':s+'s';

async function load(){
  let d;
  try{const r=await fetch('analytics.json');if(!r.ok)throw 0;d=await r.json();}
  catch{document.getElementById('main').innerHTML='<div class="empty"><p>Analytiikkadataa ei löydy.</p><p>Varmista että <code>analytics.json</code> on samassa kansiossa.</p></div>';document.getElementById('hdr-meta').textContent='Ei dataa';return;}

  const gen=d.generated?new Date(d.generated).toLocaleDateString('fi-FI'):'—';
  document.getElementById('hdr-meta').textContent='Päivitetty '+gen;
  const avgMin=d.avg_session_s?Math.floor(d.avg_session_s/60)+':'+String(d.avg_session_s%60).padStart(2,'0'):'—';

  const intE=Object.entries(d.interest||{}).sort(([,a],[,b])=>b-a);
  const maxI=intE[0]?.[1]||1;
  const chMap=d.chapters||{};const evMap=d.evidence||{};const slMap=d.sliders||{};const rdMap=d.reading||{};

  const intTable=intE.length?`<div class="card" style="overflow-x:auto">
    <div class="row hdr" style="grid-template-columns:3.5rem 1fr 60px 60px 60px 90px">
      <div>Luku</div><div>Nimi</div><div style="text-align:right">Avaukset</div><div style="text-align:right">Evidenssi</div><div style="text-align:right">Slider</div><div style="text-align:right">Kiinnostus</div>
    </div>
    ${intE.map(([id,sc])=>`<div class="row" style="grid-template-columns:3.5rem 1fr 60px 60px 60px 90px">
      <div class="ch-id ${ct(id)}">${id}</div><div class="ch-name">${CN[id]||id}</div>
      <div class="num${(chMap[id]||0)>2?' hi':''}">${chMap[id]||'—'}</div>
      <div class="num${(evMap[id]?.reads||0)>0?' hi':''}">${evMap[id]?.reads||'—'}</div>
      <div class="num${(slMap[id]?.changes||0)>0?' hi':''}">${slMap[id]?.changes||'—'}</div>
      <div class="score-wrap">
        <div class="bar-fill gold" style="width:${Math.round(sc/maxI*60)}px;height:4px;border-radius:2px;flex-shrink:0"></div>
        <div class="score-val">${sc.toFixed(1)}</div>
      </div>
    </div>`).join('')}
  </div>`:'<div class="empty">Ei pisteytystä vielä.</div>';

  const profE=Object.entries(d.profiler||{}).sort(([,a],[,b])=>b-a);
  const totP=profE.reduce((s,[,v])=>s+v,0)||1;
  const profTable=profE.length?`<div class="card">${profE.map(([k,c])=>`
    <div class="row" style="grid-template-columns:1fr 80px 36px">
      <div class="ch-name">${PN[k]||k}</div>
      <div class="bar-wrap"><div class="bar-fill purple" style="width:${Math.round(c/totP*100)}%"></div></div>
      <div class="num">${Math.round(c/totP*100)}%</div>
    </div>`).join('')}</div>`:'<div class="empty">Ei profiilituloksia vielä.</div>';

  const rdE=Object.entries(rdMap).sort(([a],[b])=>((d.interest||{})[b]||0)-((d.interest||{})[a]||0));
  const rdTable=rdE.length?`<div class="card">${rdE.map(([id,r])=>`
    <div class="row" style="grid-template-columns:3.5rem 1fr 55px 60px 60px">
      <div class="ch-id ${ct(id)}">${id}</div>
      <div class="ch-name">${CN[id]||id}</div>
      <div class="num${(r.avg_depth||0)>60?' hi':''}">${r.avg_depth?r.avg_depth+'%':'—'}</div>
      <div class="num">${fmtTime(r.avg_time_s)}</div>
      <div class="bar-wrap"><div class="bar-fill green" style="width:${r.avg_depth||0}%"></div></div>
    </div>`).join('')}</div>`:'<div class="empty">Ei syvyystietoja vielä.</div>';

  const slE=Object.entries(slMap).sort(([,a],[,b])=>b.changes-a.changes);
  const slTable=slE.length?`<div class="card">${slE.map(([id,s])=>{
    const def=CD[id]||0;const diff=s.avg!=null?+(s.avg-def).toFixed(2):null;
    return `<div class="row" style="grid-template-columns:3.5rem 1fr 60px 70px 80px">
      <div class="ch-id ${ct(id)}">${id}</div><div class="ch-name">${CN[id]||id}</div>
      <div class="num hi">${s.changes}</div>
      <div class="num">${s.avg!=null?s.avg.toFixed(2)+' mrd':'—'}</div>
      <div class="num" style="color:${diff>0?'var(--drift)':'var(--change)'}">${diff!=null?(diff>=0?'+':'')+diff+' mrd':'—'}</div>
    </div>`;}).join('')}</div>`:'<div class="empty">Ei slider-muutoksia vielä.</div>';

  document.getElementById('main').innerHTML=`
    <div class="kpi-strip">
      <div class="kpi-cell"><span class="kpi-val">${d.total_sessions??'—'}</span><span class="kpi-lbl">Sessioita</span></div>
      <div class="kpi-cell"><span class="kpi-val">${avgMin}</span><span class="kpi-lbl">Keskim. aika</span></div>
      <div class="kpi-cell"><span class="kpi-val">${d.summary_opens??'—'}</span><span class="kpi-lbl">Yhteenveto</span></div>
      <div class="kpi-cell"><span class="kpi-val">${d.pivot_opens??'—'}</span><span class="kpi-lbl">Pivot</span></div>
      <div class="kpi-cell"><span class="kpi-val">${d.feedback_count??'—'}</span><span class="kpi-lbl">Palautetta</span></div>
    </div>

    <div class="section">
      <div class="section-title">Kiinnostuspisteytys — luvuittain</div>
      <p class="section-note">Korkea pistemäärä = luku resonoi ja saa lukijan toimimaan. Yhdistää kaikki signaalit painotettuna.</p>
      <div class="signal-pills">
        <span class="pill">Avaus <strong>×1</strong></span>
        <span class="pill">Evidenssi luettu <strong>×2</strong></span>
        <span class="pill">Slider muutettu <strong>×3</strong></span>
        <span class="pill">Tulostettu / jaettu <strong>×4</strong></span>
        <span class="pill">Palaute lähetetty <strong>×5</strong></span>
      </div>
      ${intTable}
    </div>

    <div class="two-col">
      <div class="section">
        <div class="section-title">Lukijaprofiili — jakautuma</div>
        <p class="section-note">Millä linssillä lukijat tarkastelevat kirjaa.</p>
        ${profTable}
      </div>
      <div class="section">
        <div class="section-title">Lukusyvyys ja aika</div>
        <p class="section-note">Kuinka pitkälle luvussa scrollattiin.</p>
        ${rdTable}
      </div>
    </div>

    <div class="section">
      <div class="section-title">Slider-muutokset — lukijan omat arviot</div>
      <p class="section-note">Muutokset kertovat missä lukija on eri mieltä tai testaa omaa skenaariota.</p>
      ${slTable}
    </div>

    <div class="section">
      <div class="section-title">Tietoa datasta</div>
      <div style="font-size:.72rem;color:var(--ink-3);line-height:1.8;background:var(--surface);border:1px solid var(--rule);border-radius:var(--r);padding:1rem 1.25rem">
        Data aggregoidaan GitHub Issues -kommenteista päivittäin klo 6 UTC.<br>
        Ei IP-osoitteita · ei henkilötietoja · ei evästeitä.
      </div>
    </div>`;

  requestAnimationFrame(()=>{
    document.querySelectorAll('.bar-fill').forEach(el=>{const w=el.style.width;el.style.width='0';setTimeout(()=>el.style.width=w,80);});
  });
}
load();
</script>
</body>
</html>
