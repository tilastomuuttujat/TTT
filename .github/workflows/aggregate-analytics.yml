name: Aggregate JIM Analytics

on:
  schedule:
    - cron: '0 6 * * *'   # Päivittäin klo 6 UTC
  workflow_dispatch:        # Myös käsin ajettavissa

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Kirjoitusoikeus analytics.json-tiedostoon
      issues: read          # Lukuoikeus analytiikkaissue-kommentteihin

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Fetch analytics comments and aggregate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANALYTICS_ISSUE: 1
        run: |
          node --input-type=module << 'EOF'
          import { writeFileSync } from 'fs';

          const REPO  = process.env.GITHUB_REPOSITORY;
          const ISSUE = process.env.ANALYTICS_ISSUE;
          const TOKEN = process.env.GH_TOKEN;

          async function fetchAll(url) {
            const results = [];
            let next = url + '?per_page=100';
            while (next) {
              const res  = await fetch(next, {
                headers: {
                  Authorization: `token ${TOKEN}`,
                  Accept: 'application/vnd.github.v3+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                }
              });
              const link = res.headers.get('link');
              next = link?.match(/<([^>]+)>; rel="next"/)?.[1] || null;
              const data = await res.json();
              results.push(...data);
            }
            return results;
          }

          const comments = await fetchAll(
            `https://api.github.com/repos/${REPO}/issues/${ISSUE}/comments`
          );

          // Parse all batched events from comments
          const allEvents = [];
          for (const c of comments) {
            const match = c.body.match(/```json\n([\s\S]+?)\n```/);
            if (!match) continue;
            try {
              const { batch } = JSON.parse(match[1]);
              if (Array.isArray(batch)) allEvents.push(...batch);
            } catch {}
          }

          // Aggregate
          const stats = {
            generated:     new Date().toISOString(),
            total_events:  allEvents.length,
            total_sessions: allEvents.filter(e => e.e === 'session_start').length,
            chapters:      {},
            sliders:       {},
            summary_opens: allEvents.filter(e => e.e === 'summary_open').length,
            avg_session_s: 0,
          };

          const durations = allEvents
            .filter(e => e.e === 'session_end' && e.duration_s)
            .map(e => e.duration_s);
          if (durations.length)
            stats.avg_session_s = Math.round(durations.reduce((a, b) => a + b, 0) / durations.length);

          for (const ev of allEvents) {
            if (ev.e === 'chapter_open' && ev.ch)
              stats.chapters[ev.ch] = (stats.chapters[ev.ch] || 0) + 1;

            if (ev.e === 'slider_change' && ev.ch) {
              if (!stats.sliders[ev.ch]) stats.sliders[ev.ch] = { changes: 0, values: [] };
              stats.sliders[ev.ch].changes++;
              if (ev.v != null) stats.sliders[ev.ch].values.push(ev.v);
            }
          }

          // Compute slider averages, drop raw values array
          for (const s of Object.values(stats.sliders)) {
            if (s.values.length)
              s.avg = +(s.values.reduce((a, b) => a + b, 0) / s.values.length).toFixed(2);
            delete s.values;
          }

          writeFileSync('analytics.json', JSON.stringify(stats, null, 2));
          console.log(`Aggregated ${allEvents.length} events from ${comments.length} comments`);
          EOF

      - name: Commit analytics.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add analytics.json
          git diff --staged --quiet || git commit -m "analytics: päivitetty $(date -u '+%Y-%m-%d')"
          git push
